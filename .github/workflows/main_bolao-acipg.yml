name: Build and deploy API to Azure Web App - bolao-acipg

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24.x"

      - name: Enable pnpm
        run: corepack enable

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build shared
        run: pnpm --filter @bolao-acipg/shared build

      - name: Generate Prisma Client
        run: pnpm --filter api exec prisma generate

      - name: Build API
        run: pnpm --filter api build

      - name: Prepare deploy package
        run: node apps/api/scripts/prepare-azure-deploy.mjs

      - name: Install deploy dependencies
        working-directory: deploy
        run: npm install --omit=dev --install-strategy=hoisted --no-audit --no-fund

      - name: Zip deploy package
        working-directory: deploy
        run: zip -rq ../api.zip .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: api.zip

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: node-app

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_0339821C7F64422CAE8164A5A470554D }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_92F6E1FB18B04440B176760914B8618D }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_3DBB9613DBD747DDBC4EE7471017B34F }}

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: "bolao-acipg"
          slot-name: "Production"
          package: api.zip
